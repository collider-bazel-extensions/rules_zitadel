      restartPolicy: Never
      containers:
        - name: zitadel-setup
          securityContext:
              privileged: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
          image: "ghcr.io/zitadel/zitadel:v4.13.0"
          imagePullPolicy: IfNotPresent
          args:
            - setup
            - --masterkeyFromEnv
            - --config
            - /config/zitadel-config-yaml
            - --steps
            - /config/zitadel-config-yaml
            - --init-projections=true
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: zitadel-masterkey
                  key: masterkey
            - name: ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH
              value: "/machinekey/sa.json"
            - name: ZITADEL_FIRSTINSTANCE_PATPATH
              value: "/machinekey/pat"
            - name: ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH
              value: "/login-client/pat"
            - name: ZITADEL_DATABASE_POSTGRES_AWAITINITIALCONN
              value: "5m"
            
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              value: "host=zitadel-postgresql port=5432 user=postgres password=smoke-fixture-postgres dbname=zitadel sslmode=disable"
          volumeMounts:
          - name: zitadel-config-yaml
            mountPath: /config
            readOnly: true
          - name: machinekey
            mountPath: "/machinekey"
          - name: login-client
            mountPath: "/login-client"
          resources:
            {}
        - name: zitadel-machinekey
          securityContext:
              privileged: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
          image: docker.io/alpine/k8s:1.35.0
          imagePullPolicy: 'IfNotPresent'
          command:
            - sh
            - -c
            - |
              until [ -n "$(kubectl --namespace=zitadel get pod ${POD_NAME} --output=jsonpath="{.status.containerStatuses[?(@.name=='zitadel-setup')].state.terminated}")" ]; do
                echo 'waiting for zitadel-setup container to terminate';
                sleep 5;
              done &&
              echo 'zitadel-setup container terminated' &&
              if [ -f /machinekey/sa.json ]; then
                kubectl --namespace=zitadel create secret generic iam-admin \
                  --from-file=iam-admin.json=/machinekey/sa.json \
                  --dry-run=client --output=yaml | \
                kubectl annotate --local --filename=- \
                  helm.sh/resource-policy=keep \
                  --output=yaml | \
                kubectl label --local --filename=- \
                  app.kubernetes.io/managed-by=Zitadel \
                  app.kubernetes.io/name=zitadel \
                  app.kubernetes.io/instance=zitadel \
                  --output=yaml | \
                kubectl apply --filename=-;
              fi;
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: machinekey
              mountPath: "/machinekey"
              readOnly: true
          resources:
            {}
        - name: zitadel-machine-pat
          securityContext:
              privileged: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
          image: docker.io/alpine/k8s:1.35.0
          imagePullPolicy: 'IfNotPresent'
          command:
            - sh
            - -c
            - |
              until [ -n "$(kubectl --namespace=zitadel get pod "${POD_NAME}" --output=jsonpath="{.status.containerStatuses[?(@.name=='zitadel-setup')].state.terminated}")" ]; do
                echo 'waiting for zitadel-setup container to terminate';
                sleep 5;
              done &&
              echo 'zitadel-setup container terminated' &&
              if [ -f /machinekey/pat ]; then
                kubectl --namespace=zitadel create secret generic iam-admin-pat \
                  --from-file=pat=/machinekey/pat \
                  --dry-run=client --output=yaml | \
                kubectl annotate --local --filename=- \
                  helm.sh/resource-policy=keep \
                  --output=yaml | \
                kubectl label --local --filename=- \
                  app.kubernetes.io/managed-by=Zitadel \
                  app.kubernetes.io/name=zitadel \
                  app.kubernetes.io/instance=zitadel \
                  --output=yaml | \
                kubectl apply --filename=-;
              fi;
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: machinekey
              mountPath: "/machinekey"
              readOnly: true
          resources:
            {}
        - name: zitadel-login-client-pat
          securityContext:
              privileged: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
          image: docker.io/alpine/k8s:1.35.0
          imagePullPolicy: 'IfNotPresent'
          command:
            - sh
            - -c
            - |
              until [ -n "$(kubectl --namespace=zitadel get pod ${POD_NAME} --output=jsonpath="{.status.containerStatuses[?(@.name=='zitadel-setup')].state.terminated}")" ]; do
                echo 'waiting for zitadel-setup container to terminate';
                sleep 5;
              done &&
              echo 'zitadel-setup container terminated' &&
              if [ -f /login-client/pat ]; then
                kubectl --namespace=zitadel create secret generic login-client \
                  --from-file=pat=/login-client/pat \
                  --dry-run=client --output=yaml | \
                kubectl annotate --local --filename=- \
                  helm.sh/resource-policy=keep \
                  --output=yaml | \
                kubectl label --local --filename=- \
                  app.kubernetes.io/managed-by=Zitadel \
                  app.kubernetes.io/name=zitadel \
                  app.kubernetes.io/instance=zitadel \
                  --output=yaml | \
                kubectl apply --filename=-;
              fi;
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: login-client
              mountPath: "/login-client"
              readOnly: true
          resources:
            {}
      volumes:
      - name: zitadel-config-yaml
        configMap:
          name: zitadel-config-yaml
          defaultMode: 0440
      - name: machinekey
        emptyDir: { }
      - name: login-client
        emptyDir: { }
